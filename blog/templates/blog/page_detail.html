{% extends 'base.html' %}

{% block content %}

<h1>{{ object.titulo }}</h1>

<p>{{ object.subtitulo }}</p>
<p>{{ object.contenido }}</p>

{% if object.imagen %}
    <img src="{{ object.imagen.url }}" width="300">
{% endif %}

<p>{{ object.fecha }}</p>

<a href="{% url 'edit' object.id %}">Editar</a>
<a href="{% url 'delete' object.id %}">Eliminar</a>

<br>
<a href="/pages/">Volver</a>

{% endblock %}
